<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Category color gradients -->
    <linearGradient id="physical" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="mental" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="emotional" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="spiritual" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5f0"/>
      <stop offset="100%" stop-color="#b4a7d6"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="brandLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background circle (subtle) -->
  <circle cx="256" cy="256" r="240" fill="#f5f3ff" opacity="0.5"/>
  
  <!-- Outer petals - 4 categories at cardinal directions -->
  <!-- Physical (Top) - Amber -->
  <path d="M256 40 C310 90 330 150 256 200 C182 150 202 90 256 40Z" fill="url(#physical)" opacity="0.9"/>
  
  <!-- Mental (Right) - Blue -->
  <path d="M472 256 C422 310 362 330 312 256 C362 182 422 202 472 256Z" fill="url(#mental)" opacity="0.9"/>
  
  <!-- Emotional (Bottom) - Rose -->
  <path d="M256 472 C202 422 182 362 256 312 C330 362 310 422 256 472Z" fill="url(#emotional)" opacity="0.9"/>
  
  <!-- Spiritual (Left) - Lavender -->
  <path d="M40 256 C90 202 150 182 200 256 C150 330 90 310 40 256Z" fill="url(#spiritual)" opacity="0.9"/>
  
  <!-- Inner petals - rotated 45 degrees, brand colors -->
  <!-- Top-Right -->
  <path d="M390 122 C410 175 400 220 340 260 C300 200 315 155 390 122Z" fill="url(#brandLight)" opacity="0.7"/>
  
  <!-- Bottom-Right -->
  <path d="M390 390 C337 410 292 400 252 340 C312 300 357 315 390 390Z" fill="url(#brandLight)" opacity="0.7"/>
  
  <!-- Bottom-Left -->
  <path d="M122 390 C102 337 112 292 172 252 C212 312 197 357 122 390Z" fill="url(#brandLight)" opacity="0.7"/>
  
  <!-- Top-Left -->
  <path d="M122 122 C175 102 220 112 260 172 C200 212 155 197 122 122Z" fill="url(#brandLight)" opacity="0.7"/>
  
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#brand)" stroke-width="6" opacity="0.5"/>
  
  <!-- Center circle with brand gradient -->
  <circle cx="256" cy="256" r="56" fill="url(#brand)" filter="url(#shadow)"/>
  
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="40" fill="#a78bfa" opacity="0.3"/>
  
  <!-- Center highlight -->
  <circle cx="256" cy="256" r="24" fill="white" opacity="0.15"/>
  
  <!-- "1" symbol in center representing final word -->
  <text x="256" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="white">1</text>
</svg>
